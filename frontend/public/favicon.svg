<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1420"/>
      <stop offset="55%" stop-color="#0f2318"/>
      <stop offset="100%" stop-color="#0b1420"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#1db954"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1db954" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1db954" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Soft glow behind bolt -->
  <circle cx="256" cy="200" r="220" fill="url(#glow)"/>

  <!-- Lightning bolt -->
  <path
    d="M 288 64
       L 156 296
       L 232 296
       L 208 448
       L 356 216
       L 276 216
       Z"
    fill="url(#bolt)"
    stroke="#0b1420"
    stroke-width="6"
    stroke-linejoin="round"
  />
</svg>
